<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IHL Online Referral Form</title>
    <meta http-equiv="refresh" content="0; url=index.html#referral-form" />
    <script>
      const destination = new URL("index.html#referral-form", window.location.href);
      const current = new URLSearchParams(window.location.search);
      current.forEach((value, key) => destination.searchParams.set(key, value));
      window.location.replace(destination.toString());
    </script>
  </head>
  <body>
    <p>
      The online referral form now lives on the main referrer page:
      <a href="index.html#referral-form">open the referral form</a>.
    </p>
  </body>
</html>
